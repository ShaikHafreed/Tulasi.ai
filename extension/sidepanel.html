<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tulasi Assistant</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #0b0f1a;
        color: #eceff4;
        font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid #24304a;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #2dd4bf;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        max-width: 90%;
        padding: 9px 12px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.45;
      }
      .msg.user {
        align-self: flex-end;
        background: rgba(45, 212, 191, 0.15);
      }
      .msg.assistant {
        align-self: flex-start;
        background: #1a2338;
      }
      .msg.status {
        align-self: flex-start;
        color: #2dd4bf;
        font-size: 11px;
        font-family: ui-monospace, 'SF Mono', Consolas, monospace;
      }
      .msg.error {
        align-self: flex-start;
        color: #ff7a50;
        font-size: 12px;
      }
      #confirm-bar {
        display: none;
        gap: 8px;
        padding: 10px 16px;
        border-top: 1px solid #24304a;
        align-items: center;
        font-size: 12px;
      }
      #confirm-bar button {
        border: none;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
      }
      #confirm-yes {
        background: #ff7a50;
        color: #0b0f1a;
      }
      #confirm-no {
        background: transparent;
        color: #8a93a6;
      }
      footer {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid #24304a;
      }
      #input {
        flex: 1;
        background: #131a2b;
        border: 1px solid #24304a;
        border-radius: 6px;
        color: #eceff4;
        padding: 8px 10px;
        font-size: 13px;
      }
      #send {
        background: #ff7a50;
        color: #0b0f1a;
        border: none;
        border-radius: 6px;
        padding: 0 14px;
        font-weight: 600;
        cursor: pointer;
      }
      #send:disabled {
        opacity: 0.5;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <header>Tulasi assistant</header>
    <div id="messages"></div>
    <div id="confirm-bar">
      <span id="confirm-label"></span>
      <button id="confirm-yes">Confirm</button>
      <button id="confirm-no">Dismiss</button>
    </div>
    <footer>
      <input id="input" type="text" placeholder="Describe what you want to do…" />
      <button id="send">Send</button>
    </footer>
    <script src="sidepanel.js"></script>
  </body>
</html>
