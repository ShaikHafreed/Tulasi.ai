; Tulasi gesture glove — ESP32 firmware (Track 2).
;
; Reads 5 flex sensors + an MPU6050 IMU, calibrates on boot, classifies the
; same 4 gestures the webcam track (Track 1) produces, and broadcasts them
; over BLE for the browser bridge (frontend/src/lib/gloveGesture.ts) to map
; through the existing tulasiCommands.ts whitelist.
;
; Build/flash:  pio run -t upload    (or use the PlatformIO IDE button)
; Serial tune:  pio device monitor   (set DEBUG_SERIAL=1 in config.h first)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.14
build_flags =
    -DCORE_DEBUG_LEVEL=0
